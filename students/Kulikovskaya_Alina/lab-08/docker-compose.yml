version: '3.8'

services:
  # API Gateway
  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - booking-service
      - court-service
      - payment-service
    environment:
      - BOOKING_SERVICE_URL=http://booking-service:8000
      - COURT_SERVICE_URL=http://court-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:8000

  # Booking Service
  booking-service:
    build: ./contexts/booking
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@booking-db:5432/booking
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - COURT_SERVICE_GRPC=court-service:50051
    depends_on:
      - booking-db
      - rabbitmq
      - court-service

  booking-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - booking_data:/var/lib/postgresql/data

  # Court Service
  court-service:
    build: ./contexts/court
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@court-db:5432/court
    ports:
      - "50051:50051"  # gRPC
    depends_on:
      - court-db

  court-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: court
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - court_data:/var/lib/postgresql/data

  # Payment Service
  payment-service:
    build: ./contexts/payment
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@payment-db:5432/payment
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - payment-db
      - rabbitmq

  payment-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - payment_data:/var/lib/postgresql/data

  # Notification Service
  notification-service:
    build: ./contexts/notification
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - rabbitmq

  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  booking_data:
  court_data:
  payment_data: