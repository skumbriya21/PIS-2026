version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: manezh_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manezh_booking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: manezh_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # FastAPI Application
  api:
    build: .
    container_name: manezh_api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/manezh_booking
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./src:/app/src  # Hot reload для разработки
    command: uvicorn src.infrastructure.api.main:create_app --host 0.0.0.0 --port 8000 --factory --reload

volumes:
  postgres_data:
  redis_data: